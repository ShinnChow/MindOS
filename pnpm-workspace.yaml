packages:
  - 'packages/mindos'
  - 'packages/*'
  - 'packages/*/*'
  - 'examples'
  # Product package staging output is generated by `scripts/stage-product-package.mjs`.
  # It contains nested package.json files for npm publish/runtime smoke only; they
  # must never become source workspaces or pnpm filters will run tests/builds twice.
  - '!packages/mindos/_standalone/**'
  - '!packages/mindos/apps/**'
  - '!packages/mindos/packages/**'
  - '!packages/mindos/scripts/**'
  - '!packages/mindos/assets/**'
  - '!packages/mindos/skills/**'
  - '!packages/mindos/templates/**'
