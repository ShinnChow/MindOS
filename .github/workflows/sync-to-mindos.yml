name: Sync to MindOS

# Trigger on:
# - push to main (code changes)
# - version tags (to sync tag → public repo → npm publish)
# - manual dispatch
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
      - 'desktop-v*'
      - 'clipper-v*'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mindos-dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to mindos repo
        env:
          PAT: ${{ secrets.MINDOS_SYNC_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.name "GeminiLight"
          git config --global user.email "wtfly2018@163.com"

          # Ensure push to current repo (mindos-dev) uses GitHub Actions token.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # === 1. Deploy landing/ to mindos-dev gh-pages ===
          if [ -d landing ]; then
            git subtree split --prefix landing -b gh-pages-tmp
            git push origin gh-pages-tmp:gh-pages --force
            git branch -D gh-pages-tmp
          else
            echo "No landing/ directory — skipping gh-pages deploy to mindos-dev."
          fi

          # PAT is required for cross-repo sync/publish to GeminiLight/mindos.
          if [ -z "${PAT:-}" ]; then
            echo "::error::Missing secret MINDOS_SYNC_TOKEN."
            echo "::error::Set repo secret MINDOS_SYNC_TOKEN with repo write access to GeminiLight/mindos and GeminiLight/mindos-dev."
            exit 1
          fi

          # === 2. Sync to mindos main branch ===
          #
          # ARCHITECTURE: .syncinclude-driven whitelist sync.
          #
          # .syncinclude is the Single Source of Truth for what goes public.
          # scripts/parse-syncinclude.sh parses it into shell variables.
          # Default = PRIVATE. Only explicitly listed paths are synced.
          #
          if [ ! -f .syncinclude ]; then
            echo "::error::.syncinclude not found — aborting sync for safety."
            exit 1
          fi

          # Parse .syncinclude into shell variables
          eval "$(bash scripts/parse-syncinclude.sh)"

          git clone --depth 1 "https://x-access-token:${PAT}@github.com/GeminiLight/mindos.git" /tmp/mindos || {
            echo "Target repo not found or token has no access: GeminiLight/mindos"
            exit 1
          }

          # Clean slate: remove everything except .git
          find /tmp/mindos -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # ─── Sync whitelisted directories ───────────────────────────────
          for dir in $SYNC_DIRS; do
            [ "$dir" = "wiki" ] && continue  # wiki handled separately below
            if [ -d "$dir" ]; then
              eval rsync -a --delete $GLOBAL_EXCLUDES "\"$dir/\"" "\"/tmp/mindos/$dir/\""
            fi
          done

          # ─── Sync wiki with sub-exclusions ──────────────────────────────
          if [ -d wiki/ ] && echo "$SYNC_DIRS" | grep -qw wiki; then
            eval rsync -a --delete $WIKI_EXCLUDES $GLOBAL_EXCLUDES "wiki/" "/tmp/mindos/wiki/"
          fi

          # ─── Sync CI workflows (only non-private ones) ─────────────────
          mkdir -p /tmp/mindos/.github/workflows
          for wf in .github/workflows/*.yml; do
            wf_name=$(basename "$wf")
            case "$wf_name" in
              sync-to-mindos.yml|ci.yml) continue ;;
            esac
            cp "$wf" /tmp/mindos/.github/workflows/
          done

          # ─── Sync whitelisted root files ────────────────────────────────
          for f in $ROOT_FILES; do
            if [ -L "$f" ]; then
              cp -P "$f" /tmp/mindos/
            elif [ -f "$f" ]; then
              cp "$f" /tmp/mindos/
            fi
          done

          # Get the latest commit message from mindos-dev
          DEV_MSG=$(git -C "$GITHUB_WORKSPACE" log -1 --format='%s')

          # If commit message is a bare version number, append changelog
          if echo "$DEV_MSG" | grep -qxE '[0-9]+\.[0-9]+\.[0-9]+'; then
            cd "$GITHUB_WORKSPACE"
            CUR_TAG=$(git tag --points-at HEAD | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            if [ -n "$CUR_TAG" ]; then
              PREV_TAG=$(git describe --tags --abbrev=0 "${CUR_TAG}^" 2>/dev/null || true)
            else
              PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || true)
            fi
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log "${PREV_TAG}..HEAD~1" --format='- %s' | head -20 || true)
              if [ -n "$CHANGELOG" ]; then
                DEV_MSG=$(printf '%s\n\n%s' "$DEV_MSG" "$CHANGELOG")
              fi
            fi
          fi

          cd /tmp/mindos
          # landing/ is deployed to gh-pages only
          rm -rf /tmp/mindos/landing
          git add -A

          # ─── SAFETY GUARD: blocked patterns scan ────────────────────────
          # Defense-in-depth: even if whitelist is misconfigured, these
          # patterns ALWAYS abort the sync.
          LEAKED=""
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            matches=$(git ls-files | grep -F "$pat" || true)
            if [ -n "$matches" ]; then
              for f in $matches; do
                [ -f "$f" ] && LEAKED="${LEAKED}${f}"$'\n'
              done
            fi
          done <<< "$BLOCKED_PATTERNS"

          if [ -n "$LEAKED" ]; then
            echo "::error::PRIVATE FILE LEAK DETECTED — aborting sync!"
            echo "::error::The following private files were about to be pushed to the PUBLIC repo:"
            echo "$LEAKED" | sort -u | while read -r f; do [ -n "$f" ] && echo "  ❌ $f"; done
            echo ""
            echo "::error::Fix: remove these from the rsync output, or add exclusions to .syncinclude"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "${DEV_MSG}"
            git push
          fi

          # === 3. Deploy landing/ to mindos gh-pages ===
          cd "$GITHUB_WORKSPACE"
          if [ -d landing ]; then
            if git clone --depth 1 -b gh-pages "https://x-access-token:${PAT}@github.com/GeminiLight/mindos.git" /tmp/mindos-pages 2>/dev/null; then
              echo "Cloned existing gh-pages branch."
            else
              mkdir -p /tmp/mindos-pages
              cd /tmp/mindos-pages
              git init
              git remote add origin "https://x-access-token:${PAT}@github.com/GeminiLight/mindos.git"
              git checkout --orphan gh-pages
            fi

            cd "$GITHUB_WORKSPACE"
            rsync -av --delete --exclude='.git' landing/ /tmp/mindos-pages/

            cd /tmp/mindos-pages
            git add -A
            if git diff --cached --quiet; then
              echo "No landing changes to deploy."
            else
              git commit -m "deploy: ${DEV_MSG}"
              git push origin gh-pages
            fi
          else
            echo "No landing/ directory — skipping gh-pages deploy to mindos."
          fi

          # === 4. Sync version tag to public repo + trigger workflows ===
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "Syncing tag ${TAG} to public repo..."
            cd /tmp/mindos
            git fetch origin --tags 2>/dev/null || true
            if ! git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
              git tag "${TAG}"
              git push origin "${TAG}"
              echo "✅ Tag ${TAG} pushed to GeminiLight/MindOS"
            else
              echo "Tag ${TAG} already exists on public repo, skipping."
            fi

            if [[ "${TAG}" == desktop-v* ]]; then
              echo "Triggering desktop build workflow on GeminiLight/MindOS..."
              curl -sf -X POST \
                -H "Authorization: token ${PAT}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/GeminiLight/MindOS/actions/workflows/build-desktop.yml/dispatches" \
                -d "{\"ref\":\"main\"}" \
                && echo "✅ Desktop build dispatched for ${TAG}" \
                || echo "⚠️ Failed to dispatch desktop build — check PAT permissions"
            elif [[ "${TAG}" == v* ]]; then
              echo "Triggering npm publish workflow on GeminiLight/MindOS..."
              curl -sf -X POST \
                -H "Authorization: token ${PAT}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/GeminiLight/MindOS/actions/workflows/publish-npm.yml/dispatches" \
                -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${TAG}\"}}" \
                && echo "✅ Publish workflow dispatched for ${TAG}" \
                || echo "⚠️ Failed to dispatch publish workflow — check PAT permissions"

              sleep 5
              curl -sf -X PATCH \
                -H "Authorization: token ${PAT}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/GeminiLight/MindOS/releases/tags/${TAG}" \
                -d '{"prerelease":true}' \
                && echo "✅ Marked ${TAG} as pre-release" \
                || echo "⚠️ Could not mark ${TAG} as pre-release (release may not exist yet)"
            elif [[ "${TAG}" == clipper-v* ]]; then
              echo "Clipper tag ${TAG} synced — publish-clipper.yml will trigger on public repo."
            fi
          fi
