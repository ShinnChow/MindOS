name: Publish to npm (fallback)

# Primary npm publish now happens on GeminiLight/MindOS (public repo).
# This workflow is a fallback — only triggers on manual dispatch.
# Tags are synced to public repo by sync-to-mindos.yml → triggers publish there.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.5.30)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ github.event.inputs.tag }}"
          echo "Package version: ${PKG_VERSION}"
          echo "Tag version:     ${TAG_VERSION}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version mismatch: package.json has ${PKG_VERSION} but tag is ${TAG_VERSION}"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
